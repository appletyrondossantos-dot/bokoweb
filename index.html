<!DOCTYPE html>
<html>
<head>
    <title>My First Website</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            text-align: center;
            padding-top: 50px;
        }

        h1 {
            color: #0077cc;
        }

        p {
            font-size: 18px;
        }

        button {
            background-color: #0077cc;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #005fa3;
        }
    </style>
</head>

<body>

    <h1>Welcome to My Website</h1>

    <p>This website was made with HTML in Notepad++.</p>

    <button onclick="showMessage()">
        Click Me
    </button>

    <script>
        function showMessage() {
            alert("Hello! Your website is working!");
        }
    </script>

</body>
</html>
